{% block title %}

{{ product.title }}

{% endblock %}

{% block content %}

<section id="product-detail-root" class="product-detail container py-5">

    <div class="row g-5 align-items-start">

        <!-- LEFT: IMAGE -->
        <div class="col-lg-6">
            {% include 'products/includes/productCarousel.html' %}
        </div>

        <!-- RIGHT: DETAILS -->
        <div class="col-lg-6">

            <div class="product-detail__info">

                <!-- Title -->
                <h2 class="product-detail__title">
                    {{ product.title }}
                </h2>

                <!-- Price -->
                <div class="product-detail__price">
                    ₹ {{ product.price }}
                </div>

                <!-- Description -->
                <p class="product-detail__desc">
                    {{ product.caption }}
                </p>

                <!-- Actions -->
                <div class="product-detail__actions d-flex gap-3 mt-4">

                    <a href="#" class="btn btn-primary product-detail__cart-btn">
                        Add to Cart
                    </a>

                    <a href="#" class="btn btn-outline-warning product-detail__wishlist-btn">
                        Wishlist
                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<section>
    <h2>Add Product Images</h2>
</section>

{% endblock %}
