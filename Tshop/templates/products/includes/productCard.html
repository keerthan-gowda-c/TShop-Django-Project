

<div class="col-12 col-sm-6 col-md-4 col-lg-3">
<div class="card h-100 shadow-sm border-0" >
    <div class="ratio ratio-16x9">
        <img src="{{product.thumbnail.url}}" class="card-img-top object-fit-cover" alt="{{product.title}}">
    </div>
    <div class="card-body d-flex flex-column">
        <h5 class="card-title fw-semibold">
            <a href="{% url 'prod_details' product.pk %}">{{product.title|title}}</a></h5>
        <p class="card-text text-muted small flex-grow-1">{{product.cpation|truncatechars:80}}</p>
        <div class="d-flex gap-2 mt-auto">
            <a href="{% url 'edit_product' product.pk %}" class="btn btn-outline-warning w-100"><i class="bi bi-pencil-fill"></i></a>
            <a href="{% url 'del_product' product.pk %}" class="btn btn-outline-danger w-100"><i class="bi bi-trash"></i></a>
        </div>
    </div>
</div>
</div>
