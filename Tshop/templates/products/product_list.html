{% extends 'base/base.html' %}


{% block title %}
Products
{% endblock%}

{% block content%}

<div class="container-fluid pt-5 mt-3">

    <div class="d-flex justify-content-between align-item-center mb-4">
        <h3 class="fw-bold">Products</h3>
        
        <a href="{% url 'add_product' %}" class="btn add-button"><i class="bi bi-file-earmark-plus-fill"></i></a>
    </div>

<div class="row carousel-card gt-4">
    {% for product in products %}
    
    {% include 'products/includes/productCard.html' %}
    {% empty %}
    <p>No products added yet.</p>
    {% endfor %}
</div>

</div>

{% endblock%}
